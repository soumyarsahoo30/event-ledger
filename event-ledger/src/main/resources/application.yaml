spring:
  application:
    name: event-ledger
  datasource:
    url: jdbc:h2:mem:EVENT_LEDGER;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
       enabled: true
       path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true